name: Laravel CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.IMAGE_NAME || format('{0}/galeri-batik', github.repository_owner) }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: batik_test
          MYSQL_ROOT_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql, redis, gd, zip, intl
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup .env
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=batik_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=secret/' .env

      - name: Run Migrations
        run: php artisan migrate --force

      - name: Run Tests
        run: php artisan test --coverage-min=70

  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e

            cd /opt/app/laravel

            # Pull image terbaru
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Sync .env for container
            umask 077
            cat > .env <<'EOF'
            APP_NAME=${{ secrets.APP_NAME }}
            APP_ENV=${{ secrets.APP_ENV }}
            APP_KEY=${{ secrets.APP_KEY }}
            APP_DEBUG=${{ secrets.APP_DEBUG }}
            APP_URL=${{ secrets.APP_URL }}

            APP_LOCALE=${{ secrets.APP_LOCALE }}
            APP_FALLBACK_LOCALE=${{ secrets.APP_FALLBACK_LOCALE }}
            APP_FAKER_LOCALE=${{ secrets.APP_FAKER_LOCALE }}

            APP_MAINTENANCE_DRIVER=${{ secrets.APP_MAINTENANCE_DRIVER }}
            APP_MAINTENANCE_STORE=${{ secrets.APP_MAINTENANCE_STORE }}

            BCRYPT_ROUNDS=${{ secrets.BCRYPT_ROUNDS }}

            LOG_CHANNEL=${{ secrets.LOG_CHANNEL }}
            LOG_STACK=${{ secrets.LOG_STACK }}
            LOG_DEPRECATIONS_CHANNEL=${{ secrets.LOG_DEPRECATIONS_CHANNEL }}
            LOG_LEVEL=${{ secrets.LOG_LEVEL }}

            DB_CONNECTION=${{ secrets.DB_CONNECTION }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            SESSION_DRIVER=${{ secrets.SESSION_DRIVER }}
            SESSION_LIFETIME=${{ secrets.SESSION_LIFETIME }}
            SESSION_ENCRYPT=${{ secrets.SESSION_ENCRYPT }}
            SESSION_PATH=${{ secrets.SESSION_PATH }}
            SESSION_DOMAIN=${{ secrets.SESSION_DOMAIN }}

            BROADCAST_CONNECTION=${{ secrets.BROADCAST_CONNECTION }}
            FILESYSTEM_DISK=${{ secrets.FILESYSTEM_DISK }}
            QUEUE_CONNECTION=${{ secrets.QUEUE_CONNECTION }}

            CACHE_STORE=${{ secrets.CACHE_STORE }}
            CACHE_PREFIX=${{ secrets.CACHE_PREFIX }}

            MEMCACHED_HOST=${{ secrets.MEMCACHED_HOST }}

            REDIS_CLIENT=${{ secrets.REDIS_CLIENT }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}

            MAIL_MAILER=${{ secrets.MAIL_MAILER }}
            MAIL_SCHEME=${{ secrets.MAIL_SCHEME }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}
            MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}

            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}
            AWS_BUCKET=${{ secrets.AWS_BUCKET }}
            AWS_USE_PATH_STYLE_ENDPOINT=${{ secrets.AWS_USE_PATH_STYLE_ENDPOINT }}

            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}

            VITE_APP_NAME=${{ secrets.VITE_APP_NAME }}

            FASTAPI_URL=${{ secrets.FASTAPI_URL }}
            EOF

            # Update docker-compose dengan image tag baru
            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}

            # Pull image
            docker compose pull app

            # Zero-downtime deployment
            docker compose up -d --no-deps app

            # Jalankan migration
            docker compose exec -T app php artisan migrate --force

            # Clear & warm cache
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache
            docker compose exec -T app php artisan event:cache

            # Restart queue workers
            docker compose exec -T app php artisan queue:restart

            # Cleanup image lama
            docker image prune -f

            echo "âś… Laravel deployed successfully: $IMAGE_TAG"
